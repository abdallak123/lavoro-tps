<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Anagrafica</title>
</head>
<body>

<h2>Anagrafica</h2>

<label>Nome</label><br>
<input type="text" id="nome"><br>

<label>Cognome</label><br>
<input type="text" id="cognome"><br>

<label>Data di Nascita</label><br>
<input type="date" id="dataNascita"><br>

<label>Sesso</label><br>
<input type="radio" name="sesso" value="Maschio"> Maschio
<input type="radio" name="sesso" value="Femmina"> Femmina
<input type="radio" name="sesso" value="Altro"> Altro
<br><br>

<label>Indirizzo</label><br>
<input type="text" id="indirizzo"><br><br>

<label>Città</label><br>
<input type="text" id="citta"><br><br>

<label>CAP</label><br>
<input type="text" id="cap"><br>

<label>Provincia</label><br>
<select id="provincia">
<option value="">Seleziona</option>
<option value="Milano">Milano</option>
<option value="Varese">Varese</option>
<option value="Roma">Roma</option>
</select>
<br><br>

<label>Email</label><br>
<input type="text" id="email"><br>

<label>Codice Fiscale</label><br>
<input type="text" id="codiceFiscale"><br>

<label>Mezzi di Trasporto</label><br>
<input type="checkbox" name="mezzo" value="Auto"> Auto
<input type="checkbox" name="mezzo" value="Moto"> Moto
<input type="checkbox" name="mezzo" value="Bici"> Bici
<br><br>

<label>Materia Preferita</label><br>
<select id="materia">
<option value="Matematica">Matematica</option>
<option value="TPSIT">TPSIT</option>
<option value="Informatica">Informatica</option>
</select>
<br><br>

<button onclick="inserisci()">Inserisci</button>
<br><br>
<p id="msg"></p>
<a href="stampaAna6.html">Visualizza</a>

<script>

function validaNome() {
let v = document.getElementById("nome").value;
const pattern = /^[a-zA-ZàèéìòùÀÈÉÌÒÙ ]+$/;
if (!pattern.test(v)) {
document.getElementById("msg").innerHTML = "nome non valido";
return false;
}
return true;
}

function validaCognome() {
let v = document.getElementById("cognome").value;
const pattern = /^[a-zA-ZàèéìòùÀÈÉÌÒÙ ]+$/;
if (!pattern.test(v)) {
document.getElementById("msg").innerHTML = "cognome non valido";
return false;
}
return true;
}

function validaData() {
let v = document.getElementById("dataNascita").value;
if (v == "") {
document.getElementById("msg").innerHTML = "data non valida";
return false;
}
return true;
}

function validaCap() {
let v = document.getElementById("cap").value;
const pattern = /^\d{5}$/;

if (!pattern.test(v)) {
document.getElementById("msg").innerHTML = "cap non valido";
return false;
}

return true;
}


function validaEmail() {
let v = document.getElementById("email").value;
const pattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
if (!pattern.test(v)) {
document.getElementById("msg").innerHTML = "email non valido";
return false;
}

return true;
}


function validaCodiceFiscale() {
let v = document.getElementById("codiceFiscale").value.toUpperCase();
const pattern = /^[A-Z]{6}[0-9]{2}[A-Z]{1}[0-9]{2}[A-Z]{1}[0-9]{3}[A-Z]{1}$/;

if (!pattern.test(v)) {
document.getElementById("msg").innerHTML = "codice fiscale non valido";
return false;
}

return true;
}


function getSesso() {
let radios = document.getElementsByName("sesso");
for (let i = 0; i < radios.length; i++) {
if (radios[i].checked == true) return radios[i].value;
}
return "";
}

function getMezzi() {
let checks = document.getElementsByName("mezzo");
let selezionati = "";
for (let i = 0; i < checks.length; i++) {
if (checks[i].checked == true) selezionati = selezionati + checks[i].value + " ";
}
return selezionati;
}

function getGenerazione(anno) {
switch (true) {
case anno >= 1901 && anno <= 1927: return "Generazione Grandiosa";
case anno >= 1928 && anno <= 1945: return "Generazione Silenziosa";
case anno >= 1946 && anno <= 1964: return "Baby Boomers";
case anno >= 1965 && anno <= 1980: return "Generazione X";
case anno >= 1981 && anno <= 1996: return "Millennials";
case anno >= 1997 && anno <= 2012: return "Generazione Z";
case anno >= 2013: return "Generazione Alpha";
default: return "Generazione molto vecchia";
}
}

function inserisci() {

if (!validaNome()) return;
if (!validaCognome()) return;
if (!validaData()) return;
if (!validaCap()) return;
if (!validaEmail()) return;
if (!validaCodiceFiscale()) return;

let data = document.getElementById("dataNascita").value;
let anno = new Date(data).getFullYear();


let persona = {};
persona.nome = document.getElementById("nome").value;
persona.cognome = document.getElementById("cognome").value;
persona.dataNascita = data;
persona.anno = anno;
persona.generazione = getGenerazione(anno);
persona.sesso = getSesso();
persona.indirizzo = document.getElementById("indirizzo").value;
persona.citta = document.getElementById("citta").value;
persona.cap = document.getElementById("cap").value;
persona.provincia = document.getElementById("provincia").value;
persona.email = document.getElementById("email").value;
persona.codiceFiscale = document.getElementById("codiceFiscale").value.toUpperCase();
persona.mezzi = getMezzi();
persona.materia = document.getElementById("materia").value;


let elenco = JSON.parse(localStorage.getItem("elenco"));
if (elenco == null) elenco = [];
elenco.push(persona);
localStorage.setItem("elenco", JSON.stringify(elenco));

}

</script>
</body>
</html>
