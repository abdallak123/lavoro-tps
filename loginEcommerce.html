<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - NewExpedetion</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#2f2a24,#4d4034,#7b6245);
    min-height:100vh;
    color:white;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.container{
    display:flex;
    min-height:100vh;
    animation:fadeIn 1s ease;
}

.sidebar{
    width:260px;
    background:#1d1a17;
    padding:40px 20px;
    border-right:2px solid #d4af37;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#d4af37;
    margin-bottom:40px;
}

.logo span{
    color:white;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    margin-bottom:18px;
}

.sidebar ul li a{
    display:block;
    text-decoration:none;
    color:white;
    padding:14px;
    border-radius:10px;
    transition:0.3s;
}

.sidebar ul li a:hover{
    background:#d4af37;
    color:#1d1a17;
}

.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    padding:40px;
}

.form-box{
    width:400px;
    background:rgba(255,255,255,0.08);
    padding:35px;
    border-radius:20px;
}

.info-box{
    max-width:500px;
    background:rgba(0,0,0,0.25);
    padding:35px;
    border-radius:20px;
    line-height:1.8;
}

.form-box h2{
    color:#d4af37;
    margin-bottom:25px;
    text-align:center;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
}

.input-group input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#d4af37;
    color:#1d1a17;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#f7d76d;
}

.info-box h1{
    color:#d4af37;
    margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

    <aside class="sidebar">

        <div class="logo">
            New<span>Expedetion</span>
        </div>

        <ul>
            <li><a href="registrazioneEcommerce.html">Registrazione</a></li>
            <li><a href="loginEcommerce.html">Login</a></li>
            <li><a href="vetrinaEcommerce.html">Vetrina</a></li>
            <li><a href="carrelloEcommerce.html">Carrello</a></li>
        </ul>

    </aside>

    <main class="main">

        <!-- FORM LOGIN -->
        <div class="form-box">

            <h2>Login</h2>

            <form id="loginForm">

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password">
                </div>

                <button type="submit" class="btn">
                    Accedi
                </button>

            </form>

        </div>

        <!-- INFO -->
        <div class="info-box">

            <h1>Area Utente Premium</h1>

            <p>
                Accedi al mondo esclusivo di NewExpedetion.
            </p>

            <p>
                Benefici esclusivi:
            </p>

            <p>
                ✔ Offerte VIP<br>
                ✔ Nuovi minerali in anteprima<br>
                ✔ Storico ordini completo<br>
                ✔ Download ricevute PDF<br>
                ✔ Spedizioni premium
            </p>

        </div>

    </main>

</div>

<script>

const loginForm = document.getElementById("loginForm");

loginForm.addEventListener("submit", function(event){

    event.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    // Recupero utente
    const utente = JSON.parse(localStorage.getItem("utenteRegistrato"));

    if(!utente){
        alert("Nessun utente registrato.");
        return;
    }

    // Verifica credenziali
    if(email === utente.email && password === utente.password){

        // Salva login
        localStorage.setItem("isLoggedIn", "true");

        alert("Login effettuato!");

        // Redirect
        window.location.href = "vetrinaEcommerce.html";

    }else{

        alert("Credenziali errate.");

    }

});

</script>

</body>
</html>
